<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Dino Ruge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  /* ---------- Identidade visual: selva ensolarada, tudo gordinho e arredondado ----------
     Paleta:
       --ceu      #7ec8ff  (azul céu)
       --ceu2     #b8e6ff  (céu claro)
       --grama    #69c267  (verde folha)
       --grama2   #4ea84d  (verde escuro)
       --sol      #ffd23f  (amarelo sol)
       --laranja  #ff8a3d  (acento / botão)
       --texto    #2c4a2b  (verde quase preto)
  */
  :root{
    --ceu:#7ec8ff; --ceu2:#b8e6ff; --grama:#69c267; --grama2:#4ea84d;
    --sol:#ffd23f; --laranja:#ff8a3d; --texto:#2c4a2b;
    --fonte:"Fredoka","Trebuchet MS",system-ui,sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; overflow:hidden; font-family:var(--fonte); user-select:none;}
  body{
    background:linear-gradient(180deg,var(--ceu) 0%, var(--ceu2) 55%);
    touch-action:manipulation;
  }
  #palco{position:fixed; inset:0; overflow:hidden;}

  /* Sol e nuvens — só ambiente */
  #sol{position:absolute; top:6vh; right:8vw; width:18vmin; height:18vmin;
       background:var(--sol); border-radius:50%; box-shadow:0 0 12vmin rgba(255,210,63,.55);}
  .nuvem{position:absolute; background:#fff; border-radius:50px; opacity:.9;
         width:24vmin; height:8vmin;}
  .nuvem::before,.nuvem::after{content:""; position:absolute; background:#fff; border-radius:50%;}
  .nuvem::before{width:11vmin; height:11vmin; top:-5vmin; left:3vmin;}
  .nuvem::after{width:8vmin; height:8vmin; top:-3vmin; left:12vmin;}
  #n1{top:14vh; left:8vw;} #n2{top:24vh; right:24vw; transform:scale(.7);}

  /* Chão de grama */
  #chao{position:absolute; left:0; right:0; bottom:0; height:26vh;
        background:linear-gradient(180deg,var(--grama),var(--grama2));
        border-top:1.2vh solid #7ed87b; border-radius:50% 50% 0 0 / 12vh 12vh 0 0;}

  /* ---------- O DINO: a estrela. Cresce e pula com o rugido ---------- */
  #dino{position:absolute; left:50%; bottom:20vh; transform:translateX(-50%);
        font-size:30vmin; line-height:1; transition:none; cursor:pointer; z-index:2;
        filter:drop-shadow(0 1vh 0 rgba(0,0,0,.12));}

  /* Anel de carga atrás do dino: enche conforme o rugido acumula força */
  #aura{position:absolute; left:50%; bottom:17vh; transform:translateX(-50%);
        width:44vmin; height:44vmin; border-radius:50%; opacity:0; z-index:1;
        background:conic-gradient(var(--laranja) var(--ang,0deg), rgba(255,255,255,.30) 0deg);
        -webkit-mask:radial-gradient(closest-side, transparent 76%, #000 78%);
                mask:radial-gradient(closest-side, transparent 76%, #000 78%);
        transition:opacity .2s ease;}
  #aura.ativo{opacity:.95;}

  /* Balão de rugido que aparece quando ruge forte */
  #bolha{position:absolute; left:63%; bottom:43vh; font-size:13vmin; line-height:1; z-index:6;
         opacity:0; transform:scale(.4) rotate(-12deg); pointer-events:none;
         transition:opacity .08s, transform .08s;}
  #bolha.ativo{opacity:1; transform:scale(1) rotate(-6deg);}

  /* Bichinho-alvo treme enquanto a carga sobe (antecipação) */
  @keyframes tremer{0%,100%{transform:translateX(0)}25%{transform:translateX(-1.2vmin)}75%{transform:translateX(1.2vmin)}}
  .bicho.medo{animation:tremer .16s linear infinite;}

  /* Estrelinha de "poof" quando o bicho foge */
  .poof{position:absolute; font-size:9vmin; pointer-events:none; z-index:7;
        animation:poof .6s ease forwards;}
  @keyframes poof{0%{opacity:1; transform:scale(.3)}100%{opacity:0; transform:scale(1.8) translateY(-6vh)}}

  /* Bichinhos pra espantar */
  .bicho{position:absolute; bottom:21vh; font-size:11vmin; line-height:1; z-index:4;
         transition:transform .5s cubic-bezier(.34,1.56,.64,1), opacity .5s ease;}
  .bicho.foi{transform:translate(var(--fugaX,40vw),-30vh) rotate(40deg) scale(.4); opacity:0;}

  /* Faixa de transição de fase */
  #faixa{position:absolute; top:16vh; left:50%; transform:translateX(-50%) scale(.6);
         background:#fff; color:var(--texto); font-family:var(--fonte); font-weight:700;
         font-size:7vmin; padding:1.8vh 6vw; border-radius:8vmin; white-space:nowrap;
         box-shadow:0 1vh 0 rgba(0,0,0,.12); opacity:0; pointer-events:none; z-index:8;
         transition:opacity .3s ease, transform .3s ease;}
  #faixa.ativo{opacity:1; transform:translateX(-50%) scale(1);}

  /* Medidor de rugido (folha que enche) */
  #medidor{position:absolute; left:5vw; bottom:20vh; width:9vmin; height:42vh;
           background:rgba(255,255,255,.45); border:.6vh solid #fff; border-radius:6vmin;
           overflow:hidden;}
  #nivel{position:absolute; left:0; right:0; bottom:0; height:0%;
         background:linear-gradient(0deg,var(--laranja),var(--sol)); transition:height .06s linear;}

  /* Plaquinhas de bichinho restante (pontinhos no topo) */
  #placar{position:absolute; top:4vh; left:50%; transform:translateX(-50%);
          display:flex; gap:2vmin; font-size:7vmin;}
  #placar span{transition:transform .3s ease, opacity .3s ease;}
  #placar span.foi{opacity:.25; transform:scale(.7);}

  /* ---------- Overlays (começar / venceu) ---------- */
  .tela{position:absolute; inset:0; display:flex; flex-direction:column;
        align-items:center; justify-content:center; gap:4vh;
        background:rgba(126,200,255,.55); backdrop-filter:blur(4px); z-index:10;}
  .tela.oculto{display:none;}
  .titulo{font-size:11vmin; font-weight:700; color:#fff; text-align:center;
          text-shadow:0 .6vh 0 rgba(0,0,0,.18); line-height:1.05;}
  .botao{font-family:var(--fonte); font-weight:700; font-size:7vmin; color:#fff;
         background:var(--laranja); border:none; border-radius:50%;
         width:34vmin; height:34vmin; box-shadow:0 1.2vh 0 #d96a22; cursor:pointer;
         display:flex; align-items:center; justify-content:center; flex-direction:column;
         gap:1vh; line-height:1; transition:transform .08s ease;}
  .botao:active{transform:translateY(.8vh); box-shadow:0 .4vh 0 #d96a22;}
  .botao small{font-size:4vmin; font-weight:600;}
  .dica{color:#fff; font-size:4.5vmin; font-weight:600; opacity:.95; text-align:center;
        max-width:80vw; line-height:1.3;}

  /* Confete */
  .confete{position:absolute; top:-5vh; width:2.5vmin; height:3.5vmin; border-radius:.4vmin;
           z-index:9; animation:cai linear forwards;}
  @keyframes cai{to{transform:translateY(115vh) rotate(720deg);}}

  @media (prefers-reduced-motion: reduce){
    .bicho,#nivel,.botao,#placar span{transition:none;}
    .bicho.medo{animation:none;}
    .confete,.poof{display:none;}
  }
</style>
</head>
<body>
<div id="palco">
  <div id="sol"></div>
  <div class="nuvem" id="n1"></div>
  <div class="nuvem" id="n2"></div>
  <div id="chao"></div>

  <div id="placar"></div>

  <div id="medidor"><div id="nivel"></div></div>

  <div id="faixa"></div>

  <div id="aura"></div>
  <div id="dino" role="button" aria-label="Dino. Toque para rugir.">🦖</div>
  <div id="bolha">🗯️</div>

  <!-- Tela inicial: precisa de um toque pra liberar áudio/microfone no navegador -->
  <div class="tela" id="telaInicio">
    <div class="titulo">🦖<br>DINO RUGE</div>
    <button class="botao" id="btnComecar">▶<small>começar</small></button>
    <div class="dica">Rugir FORTE e sem parar enche o anel e espanta os bichinhos! Toque no dino também ajuda 🗯️</div>
  </div>

  <!-- Tela de vitória -->
  <div class="tela oculto" id="telaFim">
    <div class="titulo">EBA! 🎉<br>VOCÊ CONSEGUIU!</div>
    <button class="botao" id="btnDeNovo">↻<small>de novo</small></button>
  </div>
</div>

<script>
"use strict";
/* =====================================================================
   DINO RUGE — protótipo de referência pro Godot
   Loop central:  microfone  →  volume (RMS)  →  reação do jogo
   Os comentários // GODOT: marcam o equivalente em GDScript.
   ===================================================================== */

const $ = (s)=>document.querySelector(s);
const dino    = $("#dino");
const nivelEl = $("#nivel");
const aura    = $("#aura");
const bolha   = $("#bolha");
const palco   = $("#palco");
const placarEl= $("#placar");
const faixa   = $("#faixa");
let bichos = [];   // divs dos bichos, recriados a cada fase
let placar = [];   // plaquinhas do topo, idem

// ---------- ESTADO DO JOGO ----------
const estado = {
  rodando:false,
  volume:0,        // 0..1 suavizado (instantâneo)
  carga:0,         // 0..1 força acumulada do rugido pro bichinho da vez
  faseIdx:0,
  espantados:0,    // dentro da fase atual
};

// ---------- DIFICULDADE BASE (é só aqui que se mexe) ----------
const GANHO      = 2.3;   // ganho do microfone: MENOR = precisa rugir mais alto
const FORCA_MIN  = 0.28;  // só volume ACIMA disso enche a carga -> som baixo NÃO conta
const VEL_CARGA  = 2.7;   // quão rápido a carga enche num rugido forte (por segundo)
const DECAIMENTO = 1.0;   // quão rápido a carga escorre quando fica quieto (por segundo)

// ---------- FASES (adicione/edite à vontade) ----------
// Cada fase: um tema de céu, um nível de dificuldade e a lista de bichos (emoji + nome falado).
const FASES = [
  { nome:"Quintal",  ceu:["#7ec8ff","#b8e6ff"], dificuldade:1.00, bichos:[
      {emoji:"🐰",nome:"coelho"},   {emoji:"🐤",nome:"pintinho"}, {emoji:"🐢",nome:"tartaruga"}]},
  { nome:"Fazenda",  ceu:["#ffcf8f","#ffe6c2"], dificuldade:1.08, bichos:[
      {emoji:"🐄",nome:"vaca"},     {emoji:"🐷",nome:"porco"},    {emoji:"🐔",nome:"galinha"}]},
  { nome:"Floresta", ceu:["#9fe0b6","#cdeedd"], dificuldade:1.16, bichos:[
      {emoji:"🦊",nome:"raposa"},   {emoji:"🦉",nome:"coruja"},   {emoji:"🐿️",nome:"esquilo"}]},
  { nome:"Selva",    ceu:["#8fd6e8","#c2ecf3"], dificuldade:1.25, bichos:[
      {emoji:"🐵",nome:"macaco"},   {emoji:"🐘",nome:"elefante"}, {emoji:"🦁",nome:"leão"}]},
];

// Posições dos bichos no chão (em vw) e pra onde cada um foge
const SLOTS = [
  {left:14, fuga:-58}, {left:72, fuga:58}, {left:86, fuga:64}, {left:30, fuga:-64},
];

// Dificuldade efetiva da fase atual (preenchida em montarFase)
let efForcaMin = FORCA_MIN, efVel = VEL_CARGA;

// ---------- ÁUDIO: microfone -> analisador ----------
// GODOT: AudioStreamMicrophone num bus com AudioEffectCapture.
//        Lê-se o buffer com get_buffer() e calcula-se o RMS igual aqui.
let audioCtx, analisador, dados;

async function iniciarMic(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const src  = audioCtx.createMediaStreamSource(stream);
    analisador = audioCtx.createAnalyser();
    analisador.fftSize = 1024;
    dados = new Uint8Array(analisador.fftSize);
    src.connect(analisador);   // não conecto no destino: não quero ouvir o eco
    return true;
  }catch(e){
    // Sem permissão de microfone (ou bloqueado no iframe): o jogo segue no toque.
    console.warn("Microfone indisponível, usando toque como rugido.", e);
    return false;
  }
}

// Lê o volume atual do microfone como RMS normalizado (0..1)
// GODOT: mesma conta sobre os frames do AudioEffectCapture.
function lerVolume(){
  if(!analisador) return 0;
  analisador.getByteTimeDomainData(dados);
  let soma = 0;
  for(let i=0;i<dados.length;i++){
    const v = (dados[i]-128)/128;   // -1..1
    soma += v*v;
  }
  const rms = Math.sqrt(soma/dados.length);
  return Math.min(1, rms*GANHO);    // ganho menor: agora exige rugido de verdade
}

// ---------- LOOP PRINCIPAL ----------
// GODOT: o conteúdo daqui vai no _process(delta).
let ultimoTs = 0;
function loop(ts){
  if(!estado.rodando) return;
  const dt = ultimoTs ? Math.min(0.05, (ts - ultimoTs)/1000) : 0.016; // segundos
  ultimoTs = ts;

  const alvo = lerVolume();
  // Suavização (lerp) pra reação não tremer. GODOT: lerp(volume, alvo, 0.3)
  estado.volume += (alvo - estado.volume) * 0.3;

  acumularCarga(dt);
  reagir(ts);

  requestAnimationFrame(loop);
}

// Som forte (acima de FORCA_MIN) ENCHE a carga; quieto, ela escorre.
// Quando a carga chega a 1, o bichinho da vez foge. GODOT: igual em _process(delta).
function acumularCarga(dt){
  const v = estado.volume;
  if(v > efForcaMin){
    estado.carga += (v - efForcaMin) * efVel * dt;
  }else{
    estado.carga -= DECAIMENTO * dt;
  }
  estado.carga = Math.max(0, Math.min(1, estado.carga));

  // o bichinho-alvo treme mais conforme a carga sobe (antecipação)
  const atual = bichos[estado.espantados];
  if(atual) atual.classList.toggle("medo", estado.carga > 0.15);

  if(estado.carga >= 1) espantarProximo();
}

// Feedback visual: dino cresce com a FORÇA, respira parado, anel e balão de rugido
function reagir(ts){
  const v = estado.volume, c = estado.carga;
  const bob    = Math.sin(ts/350) * 1.2;        // respira mesmo em silêncio
  const escala = 1 + c*0.5 + v*0.45;            // cresce com a carga
  const pulo   = v*16 + c*6;
  dino.style.transform = `translateX(-50%) translateY(${-(pulo+bob)}vh) scale(${escala})`;

  nivelEl.style.height = (v*100)+"%";                 // barra = volume ao vivo
  aura.classList.toggle("ativo", c > 0.02);           // anel = carga acumulada
  aura.style.setProperty("--ang", (c*360)+"deg");
  bolha.classList.toggle("ativo", v > efForcaMin);    // 🗯️ quando ruge forte
}

// ---------- AÇÕES DO JOGO ----------
const NUMEROS = ["um","dois","três"];

function espantarProximo(){
  if(estado.espantados >= bichos.length) return;
  const i = estado.espantados;
  const bicho = bichos[i];
  bicho.classList.remove("medo");
  poofEm(bicho);                     // estrelinha ✨ + som de pop
  bicho.classList.add("foi");
  placar[i].classList.add("foi");
  estado.espantados++;
  estado.carga = 0;                  // zera a carga pro próximo

  falar(NUMEROS[i]);                 // conta em voz alta: "um... dois... três"

  if(estado.espantados === bichos.length){
    setTimeout(proximaFase, 700);    // fim da fase -> próxima (ou vitória final)
  }
}

// ---------- FASES ----------
// Monta os bichos e o tema da fase idx. GODOT: equivalente a instanciar uma cena de fase.
function montarFase(idx){
  const fase = FASES[idx];
  estado.faseIdx = idx;
  estado.espantados = 0;
  estado.carga = 0;

  // dificuldade efetiva: fases mais altas exigem rugido mais forte e mais longo
  efForcaMin = FORCA_MIN + (fase.dificuldade - 1) * 0.10;
  efVel      = VEL_CARGA / fase.dificuldade;

  // tema do céu
  document.body.style.background =
    `linear-gradient(180deg, ${fase.ceu[0]} 0%, ${fase.ceu[1]} 55%)`;

  // limpa o que sobrou da fase anterior
  bichos.forEach(b => b.remove());
  bichos = []; placar = []; placarEl.innerHTML = "";

  // cria os bichos desta fase + as plaquinhas do topo
  fase.bichos.forEach((dado, i) => {
    const slot = SLOTS[i % SLOTS.length];
    const el = document.createElement("div");
    el.className = "bicho";
    el.textContent = dado.emoji;
    el.dataset.nome = dado.nome;
    el.style.left = slot.left + "vw";
    el.style.setProperty("--fugaX", slot.fuga + "vw");
    // tocar no bicho: ele pula e o app fala o nome (interativo + didático)
    el.addEventListener("pointerdown", (e) => {
      if(!estado.rodando || el.classList.contains("foi")) return;
      e.stopPropagation();
      el.animate([{transform:"translateY(0)"},{transform:"translateY(-8vh)"},{transform:"translateY(0)"}],
                 {duration:380, easing:"ease"});
      falar(el.dataset.nome);
    });
    palco.insertBefore(el, aura);
    bichos.push(el);

    const sp = document.createElement("span");
    sp.textContent = dado.emoji;
    placarEl.appendChild(sp);
    placar.push(sp);
  });
}

// Vai pra próxima fase, ou vence se era a última
function proximaFase(){
  const prox = estado.faseIdx + 1;
  if(prox >= FASES.length){ vencer(); return; }
  estado.rodando = false;                 // pausa curtinha na virada
  const fase = FASES[prox];
  falar("Muito bem!");
  setTimeout(() => {
    montarFase(prox);
    mostrarFaixa("Fase " + (prox + 1) + " · " + fase.nome);
    estado.rodando = true; ultimoTs = 0;
    requestAnimationFrame(loop);
  }, 900);
}

// Faixa "Fase N" que aparece e some
function mostrarFaixa(texto){
  faixa.textContent = texto;
  faixa.classList.add("ativo");
  clearTimeout(mostrarFaixa._t);
  mostrarFaixa._t = setTimeout(() => faixa.classList.remove("ativo"), 1500);
}

// Estrelinha no lugar do bicho que fugiu
function poofEm(el){
  const r = el.getBoundingClientRect();
  const s = document.createElement("div");
  s.className = "poof"; s.textContent = "✨";
  s.style.left = (r.left + r.width/2)/innerWidth*100 + "vw";
  s.style.top  = (r.top)/innerHeight*100 + "vh";
  document.getElementById("palco").appendChild(s);
  setTimeout(()=>s.remove(), 600);
  tocarPop();
}

// Som curto de "pop" — reusa o audioCtx, funciona até sem microfone
function tocarPop(){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain(), t = audioCtx.currentTime;
  o.type = "triangle";
  o.frequency.setValueAtTime(720, t);
  o.frequency.exponentialRampToValueAtTime(180, t+0.18);
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.25);
  o.connect(g).connect(audioCtx.destination);
  o.start(t); o.stop(t+0.26);
}

// Voz pt-BR (sem texto na tela pra criança ler)
function falar(texto){
  if(!("speechSynthesis" in window)) return;
  const u = new SpeechSynthesisUtterance(texto);
  u.lang = "pt-BR"; u.rate = 0.9; u.pitch = 1.3;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function vencer(){
  estado.rodando = false;
  falar("Eba! Você conseguiu!");
  jogarConfete();
  $("#telaFim").classList.remove("oculto");
}

// Toque no dino empurra a carga (fallback sem mic + diversão pra mãos pequenas)
dino.addEventListener("pointerdown", ()=>{
  if(!estado.rodando) return;
  estado.carga = Math.min(1, estado.carga + 0.34);  // ~3 toques espantam um
  estado.volume = 0.6;                               // dá o feedback visual
  if(estado.carga >= 1) espantarProximo();
});

// (toque nos bichos é configurado dentro de montarFase, pois eles são criados por fase)

// ---------- CONTROLE DE TELAS ----------
async function comecar(){
  $("#telaInicio").classList.add("oculto");
  audioCtx = new (window.AudioContext||window.webkitAudioContext)(); // áudio p/ mic + efeitos
  await iniciarMic();                 // pede o microfone (precisa do toque do usuário)
  iniciarPartida();
}

// Começa (ou recomeça) da fase 1
function iniciarPartida(){
  $("#telaFim").classList.add("oculto");
  montarFase(0);
  mostrarFaixa("Fase 1 · " + FASES[0].nome);
  estado.rodando = true; ultimoTs = 0;
  requestAnimationFrame(loop);
}

$("#btnComecar").addEventListener("click", comecar);
$("#btnDeNovo").addEventListener("click", iniciarPartida);

// ---------- Confete (só enfeite da vitória) ----------
function jogarConfete(){
  if(matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const cores=["#ff8a3d","#ffd23f","#69c267","#7ec8ff","#ff5d8f"];
  for(let i=0;i<70;i++){
    const c=document.createElement("div");
    c.className="confete";
    c.style.left=Math.random()*100+"vw";
    c.style.background=cores[i%cores.length];
    c.style.animationDuration=(1.5+Math.random()*1.5)+"s";
    c.style.animationDelay=(Math.random()*0.4)+"s";
    document.getElementById("palco").appendChild(c);
    setTimeout(()=>c.remove(),3500);
  }
}
</script>
</body>
</html>
